name: Release APK

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Bump Version
        id: bump_version
        run: |
          # Read current version
          VERSION_NAME=$(grep 'VERSION_NAME' version.properties | cut -d'=' -f2)
          VERSION_CODE=$(grep 'VERSION_CODE' version.properties | cut -d'=' -f2)
          
          echo "Current version: $VERSION_NAME (Code: $VERSION_CODE)"
          
          # Split version name into array
          IFS='.' read -ra ADDR <<< "$VERSION_NAME"
          MAJOR=${ADDR[0]:-0}
          MINOR=${ADDR[1]:-0}
          PATCH=${ADDR[2]:-0}
          
          # Bump based on input
          if [ "${{ github.event.inputs.bump_type }}" == "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "${{ github.event.inputs.bump_type }}" == "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          
          NEW_VERSION_NAME="$MAJOR.$MINOR.$PATCH"
          NEW_VERSION_CODE=$((VERSION_CODE + 1))
          
          echo "New version: $NEW_VERSION_NAME (Code: $NEW_VERSION_CODE)"
          
          # Write back to version.properties
          sed -i "s/VERSION_NAME=.*/VERSION_NAME=$NEW_VERSION_NAME/" version.properties
          sed -i "s/VERSION_CODE=.*/VERSION_CODE=$NEW_VERSION_CODE/" version.properties
          
          # Set outputs for next steps
          echo "NEW_VERSION=$NEW_VERSION_NAME" >> $GITHUB_ENV

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign Release APK
        uses: r0adksp/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.RELEASE_KEYSTORE }}
          alias: ${{ secrets.RELEASE_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Commit and Push Version Bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add version.properties
          git commit -m "chore: bump version to ${{ env.NEW_VERSION }}"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.NEW_VERSION }}
          name: Release v${{ env.NEW_VERSION }}
          files: ${{ steps.sign_app.outputs.signedReleaseFile }}
          generate_release_notes: true
          draft: false
          prerelease: false
